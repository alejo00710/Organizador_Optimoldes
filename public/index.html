<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Producción de Moldes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 Sistema de Producción de Moldes</h1>
            <p style="color: #666; margin: 10px 0;">Control y Planificación de Producción</p>
            <span class="status" id="status">● Desconectado</span>
        </div>

        <div class="main-grid">
            <div class="card" id="loginPanel">
                <h2>🔐 Iniciar Sesión</h2>
                
                <div class="form-group">
                    <label>Usuario</label>
                    <select id="username">
                        <option value="admin">Admin</option>
                        <option value="jefe" selected>Jefe (Planner)</option>
                        <option value="operarios">Operarios</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" value="password123">
                </div>

                <div class="form-group hidden" id="operatorSelectGroup">
                    <label>Seleccionar Operario</label>
                    <select id="operatorId">
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <button class="btn" id="loginBtn">Iniciar Sesión</button>

                <div class="user-info" id="userInfo">
                    <p><strong>Usuario:</strong> <span id="displayUsername"></span></p>
                    <p><strong>Rol:</strong> <span id="displayRole"></span></p>
                    <p><strong>Operario:</strong> <span id="displayOperator">N/A</span></p>
                    <button class="btn btn-danger" id="logoutBtn">Cerrar Sesión</button>
                </div>
            </div>

            <div class="card">
                <div class="tabs">
                    <button class="tab active" data-tab="machines">🔧 Máquinas</button>
                    <button class="tab" data-tab="plan">📅 Planificar</button>
                    <button class="tab" data-tab="worklog">⏱️ Registrar Trabajo</button>
                    <button class="tab" data-tab="calendar">📊 Calendario</button>
                    <button class="tab" data-tab="reports">📈 Reportes</button>
                </div>

                <div class="tab-content active" id="tab-machines">
                    <h2>🔧 Máquinas</h2>
                    <button class="btn btn-secondary" id="loadMachinesBtn">Cargar Máquinas</button>
                    <div class="response-box" id="machinesResponse">Primero inicia sesión, luego haz clic en "Cargar Máquinas"</div>
                </div>

                <div class="tab-content" id="tab-plan">
                    <h2>📅 Crear Planificación</h2>
                    
                    <div class="form-group">
                        <label>ID Molde</label>
                        <input type="number" id="planMoldId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>ID Parte</label>
                        <input type="number" id="planPartId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>ID Máquina</label>
                        <input type="number" id="planMachineId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="date" id="planStartDate">
                    </div>

                    <div class="form-group">
                        <label>Total Horas</label>
                        <input type="number" id="planTotalHours" value="30" step="0.5" min="0. 5">
                    </div>

                    <button class="btn btn-secondary" id="createPlanBtn">Crear Planificación</button>
                    <div class="response-box" id="planResponse"></div>
                </div>

                <div class="tab-content" id="tab-worklog">
                    <h2>⏱️ Registrar Trabajo Real</h2>
                    
                    <div class="form-group">
                        <label>ID Molde</label>
                        <input type="number" id="workMoldId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>ID Parte</label>
                        <input type="number" id="workPartId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>ID Máquina</label>
                        <input type="number" id="workMachineId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>ID Operario</label>
                        <input type="number" id="workOperatorId" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label>Horas Trabajadas</label>
                        <input type="number" id="workHours" value="2. 5" step="0.5" min="0.5">
                    </div>

                    <div class="form-group">
                        <label>Nota (opcional)</label>
                        <textarea id="workNote" rows="3" placeholder="Ej: Trabajo completado sin problemas"></textarea>
                    </div>

                    <button class="btn btn-secondary" id="createWorkLogBtn">Registrar Trabajo</button>
                    <div class="response-box" id="worklogResponse"></div>
                </div>

                <div class="tab-content" id="tab-calendar">
                    <h2>📊 Ver Calendario</h2>
                    
                    <div class="form-group">
                        <label>Fecha Desde</label>
                        <input type="date" id="calendarFrom">
                    </div>

                    <div class="form-group">
                        <label>Fecha Hasta</label>
                        <input type="date" id="calendarTo">
                    </div>

                    <button class="btn btn-secondary" id="loadCalendarBtn">Cargar Calendario</button>
                    <div class="response-box" id="calendarResponse"></div>
                </div>

                <div class="tab-content" id="tab-reports">
                    <h2>📈 Reportes</h2>
                    
                    <div class="form-group">
                        <label>Fecha Desde</label>
                        <input type="date" id="reportFrom">
                    </div>

                    <div class="form-group">
                        <label>Fecha Hasta</label>
                        <input type="date" id="reportTo">
                    </div>

                    <div class="form-group">
                        <label>ID Molde (opcional)</label>
                        <input type="number" id="reportMoldId" placeholder="Dejar vacío para todos" min="1">
                    </div>

                    <button class="btn btn-secondary" id="loadReportBtn">Generar Reporte</button>
                    <button class="btn" id="loadDetailedReportBtn">Reporte Detallado</button>
                    <div class="response-box" id="reportResponse"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
